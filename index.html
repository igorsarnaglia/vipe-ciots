async function fetchCiots() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/ciots?select=*&order=emissao.asc`, {
    headers: { "apikey": SUPABASE_ANON_KEY, "Authorization": `Bearer ${SUPABASE_ANON_KEY}` }
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const rows = await res.json();
  return rows.map(r => ({
    id: r.contrato, cpfMot: r.motorista_cpf, mot: r.motorista_nome,
    cpfProp: r.proprietario_cnpj, prop: r.proprietario_nome, fil: r.filial_codigo,
    em: r.emissao ? r.emissao.split("-").reverse().join("/") : "",
    vlrC: r.vlr_contratado, adto: r.adiantamentos, ped: r.pedagio,
    rend: r.rendimentos, irrf: r.irrf, inss: r.inss, sest: r.sest,
    senat: r.senat, outros: r.outros, vlrL: r.vlr_liquido,
    rpa: r.nro_rpa,
    dtRpa: r.data_emissao_rpa ? r.data_emissao_rpa.split("-").reverse().join("/") : null,
    veic: r.veiculo, docs: r.documentos,
  }));
}

function KpiCard({ icon, label, value, sub, accent = "#FFCB05", onClick, active }) {
  const Icon = icon;
  return (
    <div onClick={onClick} style={{
      background: active ? "#353535" : "#fff", borderRadius:14, padding:"22px 20px",

      border: active ? "2px solid #FFCB05" : "2px solid transparent",
      cursor: onClick ? "pointer" : "default", transition:"all 0.25s", position:"relative", overflow:"hidden"
    }}>
      <div style={{position:"absolute", top:0, left:0, width:4, height:"100%", background: accent, borderRadius:"14px 0 0 14px"}} />
      <div style={{display:"flex", alignItems:"center", gap:14, paddingLeft:8}}>
        <div style={{
          background: active ? "rgba(255,203,5,0.15)" : `${accent}15`,
          borderRadius:12, width:46, height:46, display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0
        }}>
          <Icon size={22} color={active ? "#FFCB05" : accent} />
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:12, color: active ? "#aaa" : "#999", fontWeight:600, textTransform:"uppercase", letterSpacing:0.3}}>{label}</div>
          <div style={{fontSize:22, fontWeight:800, color: active ? "#FFCB05" : "#353535", lineHeight:1.2}}>{value}</div>
          {sub && <div style={{fontSize:12, color: active ? "#ccc" : "#999", marginTop:2}}>{sub}</div>}
        </div>
      </div>
    </div>
  );
}

function ContractCard({ c, isExpanded, onToggle, isSelected, onSelect }) {

function DetailCell({ label, value, bold, warn, accent }) {
  return (
    <div style={{
      background: warn ? "#fff8e1" : accent ? "#f0faf0" : "#f8f9fa",
      borderRadius:10, padding:"10px 14px",
      border: accent ? "1px solid #c8e6c9" : warn ? "1px solid #ffe082" : "1px solid transparent"
    }}>
      <div style={{fontSize:11, color:"#999", fontWeight:600, textTransform:"uppercase", letterSpacing:0.3, marginBottom:2}}>{label}</div>
      <div style={{fontSize:14, fontWeight: bold ? 800 : 500, color: warn ? "#e65100" : accent ? "#2e7d32" : "#353535"}}>{value}</div>
    </div>
  );
}

function App() {
  const [loggedIn, setLoggedIn] = useState(false);
  const [userName, setUserName] = useState("");
  const [search, setSearch] = useState("");
  const [filterAberto, setFilterAberto] = useState(false);
  const [filterFilial, setFilterFilial] = useState("");
  const [expandedId, setExpandedId] = useState(null);
  const [selectedForRpa, setSelectedForRpa] = useState(new Set());
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const loadData = useCallback(async () => {
    setLoading(true); setError(null);
    try { setData(await fetchCiots()); }
    catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => { if (loggedIn) loadData(); }, [loggedIn, loadData]);

  const filiais = useMemo(() => [...new Set(data.map(c => c.fil))].sort(), [data]);

  const filtered = useMemo(() => {
    let result = data;
    if (search) {
      const s = search.toLowerCase();
      result = result.filter(c => c.mot.toLowerCase().includes(s) || c.prop.toLowerCase().includes(s) || String(c.id).includes(s));
    }
    if (filterAberto) result = result.filter(c => !c.rpa);
    if (filterFilial) result = result.filter(c => c.fil === filterFilial);
    return result.sort((a, b) => {
      const parseDate = (d) => { if (!d) return 0; const p = d.split("/"); return p.length === 3 ? new Date(p[2], p[1]-1, p[0]).getTime() : 0; };
      return parseDate(a.em) - parseDate(b.em);
    });
  }, [data, search, filterAberto, filterFilial]);

  const kpis = useMemo(() => {
    const abertos = data.filter(c => !c.rpa);
    const pagos = data.filter(c => c.rpa);
    return {
      total: data.length,
      abertosCount: abertos.length,
      abertosValor: abertos.reduce((s, c) => s + (c.vlrL || 0), 0),
      pagosCount: pagos.length,
      pagosValor: pagos.reduce((s, c) => s + (c.vlrL || 0), 0),
    };
  }, [data]);

  const toggleSelect = useCallback((id, sel) => {
    setSelectedForRpa(prev => { const n = new Set(prev); sel ? n.add(id) : n.delete(id); return n; });
  }, []);

  if (!loggedIn) return <LoginScreen onLogin={u => { setUserName(u); setLoggedIn(true); }} />;

  return (
    <div style={{minHeight:"100vh", background:"#f5f5f5", fontFamily:"'Open Sans',sans-serif"}}>
      <header style={styles.header}>
        <div style={{display:"flex", alignItems:"center", gap:14}}>
          <VipeLogo height={28} color="#353535" arrowColor="#fff" />
          <div style={{width:1, height:24, background:"rgba(53,53,53,0.2)"}} />
          <span style={{fontSize:13, color:"#353535", fontWeight:700, opacity:0.7, letterSpacing:0.3}}>Saldos de Frete</span>
        </div>
        <div style={{display:"flex", alignItems:"center", gap:14}}>
          <button onClick={loadData} disabled={loading} title="Atualizar dados" style={{
            background:"rgba(53,53,53,0.08)", border:"none", borderRadius:8, padding:"6px 10px",
            cursor: loading ? "wait" : "pointer", display:"flex", alignItems:"center", gap:4,
            fontSize:11, color:"#353535", fontWeight:600, transition:"all 0.2s"
          }}>
            {loading ? <Loader2 size={14} style={{animation:"spin 1s linear infinite"}} /> : <RefreshCw size={14}/>}
            {loading ? "Carregando..." : "Atualizar"}
          </button>
          <div style={{background:"rgba(53,53,53,0.08)", borderRadius:8, padding:"6px 12px"}}>
            <span style={{fontSize:12, color:"#353535", fontWeight:600}}>{userName}</span>
          </div>
          <button onClick={() => setLoggedIn(false)} style={{
            background:"transparent", border:"1px solid rgba(53,53,53,0.2)", borderRadius:8,
            padding:"6px 10px", cursor:"pointer", display:"flex", alignItems:"center", gap:4,
            fontSize:11, color:"#353535", fontWeight:600, transition:"all 0.2s"
          }}>
            <LogOut size={13}/> Sair
          </button>
        </div>
      </header>

      <main style={{maxWidth:1200, margin:"0 auto", padding:"28px 20px"}}>
        {loading && data.length === 0 && (
          <div style={{textAlign:"center", padding:"80px 20px"}}>
            <Loader2 size={48} style={{animation:"spin 1s linear infinite", color:"#FFCB05", marginBottom:16}} />
            <p style={{fontSize:16, color:"#999", fontWeight:600}}>Carregando contratos do Supabase...</p>
          </div>
        )}
        {error && (
          <div style={{background:"#fff3cd", border:"1px solid #ffc107", borderRadius:12, padding:"16px 20px", marginBottom:20, display:"flex", alignItems:"center", gap:10}}>
            <AlertCircle size={20} color="#856404" />
            <span style={{color:"#856404", fontSize:14}}>Erro ao carregar: {error}</span>
            <button onClick={loadData} style={{marginLeft:"auto", background:"#ffc107", border:"none", borderRadius:6, padding:"6px 14px", cursor:"pointer", fontSize:12, fontWeight:700}}>Tentar novamente</button>
          </div>
        )}

        <div style={styles.kpiGrid}>
          <KpiCard icon={Truck} label="Total Contratos" value={kpis.total} sub="Mar/2026" />
          <KpiCard icon={AlertCircle} label="Em Aberto" value={kpis.abertosCount} sub={BRL(kpis.abertosValor)} accent="#d4760a" onClick={() => setFilterAberto(!filterAberto)} active={filterAberto} />
          <KpiCard icon={CheckCircle} label="Pagos" value={kpis.pagosCount} sub={BRL(kpis.pagosValor)} accent="#2e7d32" />
          <KpiCard icon={BarChart3} label="Valor Total" value={BRL(kpis.abertosValor + kpis.pagosValor)} sub="Contratado no periodo" accent="#1565c0" />
        </div>

        <div style={styles.searchBar}>
          <div style={{position:"relative", flex:"1 1 300px"}}>
            <Search size={18} style={{position:"absolute", left:14, top:14, color:"#bbb"}} />
            <input value={search} onChange={e => setSearch(e.target.value)}
              placeholder="Buscar motorista, proprietario ou contrato..."
              style={{
                width:"100%", padding:"13px 13px 13px 44px", border:"2px solid #eee", borderRadius:12,
                fontSize:14, outline:"none", boxSizing:"border-box", transition:"all 0.2s", background:"#fff"
              }}
              onFocus={e => e.target.style.borderColor = "#FFCB05"}
              onBlur={e => e.target.style.borderColor = "#eee"} />
            {search && (
              <button onClick={() => setSearch("")} style={{position:"absolute", right:12, top:14, background:"none", border:"none", cursor:"pointer", color:"#ccc"}}>
                <X size={16} />
              </button>
            )}
          </div>
          <select value={filterFilial} onChange={e => setFilterFilial(e.target.value)} style={{
            padding:"13px 16px", border:"2px solid #eee", borderRadius:12, fontSize:14,
            background:"#fff", outline:"none", cursor:"pointer", minWidth:130
          }}>
            <option value="">Todas Filiais</option>
            {filiais.map(f => <option key={f} value={f}>{f}</option>)}
          </select>
          <button onClick={() => setFilterAberto(!filterAberto)} style={{
            padding:"13px 20px", background: filterAberto ? "#353535" : "#fff",
            color: filterAberto ? "#FFCB05" : "#666", border: filterAberto ? "2px solid #FFCB05" : "2px solid #eee",
            borderRadius:12, fontSize:13, fontWeight:700, cursor:"pointer",
            display:"flex", alignItems:"center", gap:6, transition:"all 0.2s", letterSpacing:0.3
          }}>
            <Filter size={15}/> {filterAberto ? "Somente Em Aberto" : "Em Aberto"}
          </button>
        </div>

        {selectedForRpa.size > 0 && (
          <div style={{
            background:"linear-gradient(135deg, #353535, #444)", color:"#FFCB05",
            padding:"14px 22px", borderRadius:14, marginBottom:18,
            display:"flex", alignItems:"center", justifyContent:"space-between", flexWrap:"wrap", gap:10,
            boxShadow:"0 4px 16px rgba(53,53,53,0.3)"
          }}>
            <div style={{display:"flex", alignItems:"center", gap:10}}>
              <FileText size={20}/>
              <span style={{fontWeight:700, fontSize:14}}>{selectedForRpa.size} contrato(s) para gerar RPA</span>
            </div>
            <div style={{display:"flex", gap:8}}>
              <button onClick={() => setSelectedForRpa(new Set())} style={{
                background:"transparent", border:"1px solid rgba(255,203,5,0.4)", color:"#FFCB05",
                padding:"8px 18px", borderRadius:8, cursor:"pointer", fontSize:12, fontWeight:600
              }}>Limpar</button>
              <button onClick={() => alert("Contratos selecionados para RPA:\n" + [...selectedForRpa].join(", "))} style={{
                background:"#FFCB05", border:"none", color:"#353535",
                padding:"8px 18px", borderRadius:8, cursor:"pointer", fontSize:12, fontWeight:800,
                boxShadow:"0 2px 8px rgba(255,203,5,0.3)"
              }}>Gerar RPAs</button>
            </div>
          </div>
        )}

        <div style={{fontSize:12, color:"#bbb", marginBottom:14, fontWeight:600, display:"flex", alignItems:"center", gap:8}}>
          <span>{filtered.length} contrato(s)</span>
          {search && <span style={{background:"#f0f0f0", padding:"2px 8px", borderRadius:4, color:"#666"}}>"{search}"</span>}
          {filterAberto && <span style={{background:"#fff3cd", padding:"2px 8px", borderRadius:4, color:"#856404"}}>em aberto</span>}
          {filterFilial && <span style={{background:"#e3f2fd", padding:"2px 8px", borderRadius:4, color:"#1565c0"}}>{filterFilial}</span>}
        </div>

        <div>
          {filtered.map(c => {
            const key = `${c.id}-${c.cpfProp}`;
            return (
              <ContractCard key={key} c={c}
                isExpanded={expandedId === key}
                onToggle={() => setExpandedId(expandedId === key ? null : key)}
                isSelected={selectedForRpa.has(c.id)}
                onSelect={sel => toggleSelect(c.id, sel)} />
            );
          })}
          {filtered.length === 0 && !loading && (
            <div style={{textAlign:"center", padding:"64px 20px", color:"#ccc"}}>
              <Truck size={56} strokeWidth={1} style={{marginBottom:16}} />
              <p style={{fontSize:16, fontWeight:600, color:"#999"}}>Nenhum contrato encontrado</p>
              <p style={{fontSize:13, color:"#ccc"}}>Tente ajustar os filtros ou busca</p>
            </div>
          )}
        </div>
      </main>

      <footer style={{background:"#353535", color:"#777", textAlign:"center", padding:"20px", fontSize:11, marginTop:48}}>
        <VipeLogo height={16} color="#666" arrowColor="#FFCB05" />
        <p style={{marginTop:8}}>Painel de Saldos de Frete â¢ Atualizado em {new Date().toLocaleDateString("pt-BR")}</p>
      </footer>
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
